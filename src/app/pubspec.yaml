name: smart_health_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core dependencies
  http: ^1.2.2
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  file_selector: ^1.0.3
  flutter_markdown: ^0.7.4+3
  image_picker: ^1.1.2

  # Fitbit / chart / token storage
  shared_preferences: ^2.3.2
  fl_chart: ^1.1.1

  # Apple Health / Google Fit
  health: ^13.2.0
  permission_handler: ^11.3.1



  # AI providers
  google_generative_ai: ^0.4.6

  # PDF export
  pdf: ^3.10.8
  printing: ^5.12.0

  # Local notifications
  flutter_local_notifications: ^17.0.0

  # Optional background sync (can be added later)
  #workmanager: 0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sample_reports/blood_report_sample.txt
